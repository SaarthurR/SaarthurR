<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 230" font-family="ui-monospace, SFMono-Regular, Menlo, monospace">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0d1117"/>
      <stop offset="1" stop-color="#101826"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#58a6ff" stop-opacity="0.25"/>
      <stop offset="1" stop-color="#58a6ff" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="1000" height="230" rx="14" fill="url(#bg)"/>
  <ellipse cx="500" cy="115" rx="380" ry="130" fill="url(#glow)"/>

  <!-- tabla pulse rings, left -->
  <g stroke="#58a6ff" fill="none" opacity="0.55">
    <circle cx="118" cy="115" r="18">
      <animate attributeName="r" values="18;58" dur="2.4s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.55;0" dur="2.4s" repeatCount="indefinite"/>
    </circle>
    <circle cx="118" cy="115" r="18">
      <animate attributeName="r" values="18;58" dur="2.4s" begin="0.8s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.55;0" dur="2.4s" begin="0.8s" repeatCount="indefinite"/>
    </circle>
    <circle cx="118" cy="115" r="18">
      <animate attributeName="r" values="18;58" dur="2.4s" begin="1.6s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.55;0" dur="2.4s" begin="1.6s" repeatCount="indefinite"/>
    </circle>
  </g>
  <!-- tabla drum -->
  <g>
    <ellipse cx="118" cy="128" rx="26" ry="9" fill="#1f2a3a" stroke="#3d4b61"/>
    <path d="M92 128 Q92 96 118 92 Q144 96 144 128" fill="#22304a" stroke="#3d4b61"/>
    <ellipse cx="118" cy="97" rx="17" ry="6" fill="#c9a227" opacity="0.85">
      <animate attributeName="ry" values="6;4.6;6" dur="0.8s" repeatCount="indefinite"/>
    </ellipse>
    <ellipse cx="118" cy="97" rx="7" ry="2.6" fill="#0d1117" opacity="0.7"/>
  </g>

  <!-- travelling wave (Physics 7C) across the bottom -->
  <path fill="none" stroke="#3fb950" stroke-width="2" opacity="0.7"
        d="M0 196 Q 42 176 84 196 T 168 196 T 252 196 T 336 196 T 420 196 T 504 196 T 588 196 T 672 196 T 756 196 T 840 196 T 924 196 T 1008 196 T 1092 196">
    <animateTransform attributeName="transform" type="translate" values="0 0; -84 0" dur="2.2s" repeatCount="indefinite"/>
  </path>

  <!-- candlesticks (trading), right -->
  <g opacity="0.8">
    <g stroke="#3fb950" fill="#3fb950">
      <line x1="872" y1="70" x2="872" y2="128"/><rect x="866" y="84" width="12" height="30" rx="1">
        <animate attributeName="height" values="30;38;30" dur="3s" repeatCount="indefinite"/>
        <animate attributeName="y" values="84;76;84" dur="3s" repeatCount="indefinite"/></rect>
    </g>
    <g stroke="#f85149" fill="#f85149">
      <line x1="898" y1="86" x2="898" y2="148"/><rect x="892" y="98" width="12" height="34" rx="1"/>
    </g>
    <g stroke="#3fb950" fill="#3fb950">
      <line x1="924" y1="60" x2="924" y2="120"/><rect x="918" y="72" width="12" height="36" rx="1">
        <animate attributeName="height" values="36;26;36" dur="2.6s" repeatCount="indefinite"/>
        <animate attributeName="y" values="72;82;72" dur="2.6s" repeatCount="indefinite"/></rect>
    </g>
  </g>

  <!-- particle constellation (Three.js site) -->
  <g fill="#58a6ff">
    <circle cx="250" cy="60" r="2.2"><animate attributeName="cy" values="60;52;60" dur="4s" repeatCount="indefinite"/></circle>
    <circle cx="320" cy="150" r="1.8"><animate attributeName="cy" values="150;158;150" dur="5s" repeatCount="indefinite"/></circle>
    <circle cx="415" cy="45" r="2.6"><animate attributeName="cy" values="45;55;45" dur="4.4s" repeatCount="indefinite"/></circle>
    <circle cx="520" cy="180" r="2"><animate attributeName="cy" values="180;170;180" dur="3.6s" repeatCount="indefinite"/></circle>
    <circle cx="610" cy="55" r="1.8"><animate attributeName="cy" values="55;63;55" dur="5.2s" repeatCount="indefinite"/></circle>
    <circle cx="700" cy="160" r="2.4"><animate attributeName="cy" values="160;150;160" dur="4.2s" repeatCount="indefinite"/></circle>
    <circle cx="780" cy="70" r="2"><animate attributeName="cy" values="70;78;70" dur="4.8s" repeatCount="indefinite"/></circle>
  </g>
  <g stroke="#58a6ff" stroke-width="0.6" opacity="0.35">
    <line x1="250" y1="60" x2="415" y2="45"/>
    <line x1="415" y1="45" x2="610" y2="55"/>
    <line x1="610" y1="55" x2="780" y2="70"/>
    <line x1="320" y1="150" x2="520" y2="180"/>
    <line x1="520" y1="180" x2="700" y2="160"/>
  </g>

  <!-- name + tagline -->
  <text x="500" y="108" text-anchor="middle" font-size="44" font-weight="700" fill="#e6edf3" letter-spacing="6">SAARTH RANKA</text>
  <text x="500" y="140" text-anchor="middle" font-size="15" fill="#8b949e" letter-spacing="2">
    full-stack · robotics dashboards · AI tooling · markets
    <animate attributeName="opacity" values="0;1" dur="1.6s" fill="freeze"/>
  </text>

  <!-- blinking cursor -->
  <rect x="746" y="128" width="8" height="15" fill="#58a6ff">
    <animate attributeName="opacity" values="1;0;1" dur="1.2s" repeatCount="indefinite"/>
  </rect>
</svg>
